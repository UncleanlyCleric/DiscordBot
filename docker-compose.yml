version: "3.9"

services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    environment:
      - SERVER_PORT=8080
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
    ports:
      - "8080:8080"
    restart: unless-stopped

  bot:
    image: athene-bot:latest
    container_name: discord-bot
    depends_on:
      - lavalink

    working_dir: /app

    volumes:
      - ./data:/app/data   # ✅ THIS IS WHERE IT BELONGS

    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - LAVALINK_URI=http://lavalink:8080
      - LAVALINK_PASSWORD=youshallnotpass

    restart: unless-stopped